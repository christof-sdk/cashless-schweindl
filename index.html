<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cashless Schweindl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Lato', sans-serif; background: #51e0bf; }

    .screen { position: fixed; inset: 0; display: flex; flex-direction: column; }
    .hidden { display: none !important; }

    /* ── DASHBOARD ───────────────────────────── */
    #s-dash { background: #EDE7D2; }

    .dash-top {
      background: #51e0bf;
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 16px 0;
      position: relative; flex-shrink: 0;
    }

    .gear-btn {
      position: absolute; top: 18px; right: 18px;
      background: none; border: none; cursor: pointer;
      width: 30px; height: 30px; opacity: 0.8;
    }

    .ring-wrap {
      position: relative;
      width: min(55vw, 210px); height: min(55vw, 210px);
      margin: 8px 0; flex-shrink: 0;
    }
    .ring-wrap svg { width: 100%; height: 100%; }

    .ring-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; pointer-events: none;
    }
    .ring-total  { font-size: clamp(20px, 8vw, 36px); font-weight: 700; color: rgba(39,39,39,0.8); line-height: 1.1; }
    .ring-sub    { font-size: clamp(12px, 3.8vw, 18px); font-weight: 700; color: rgba(39,39,39,0.8); margin-top: 2px; }

    .dash-jar-name {
      font-size: clamp(20px, 6vw, 30px); font-weight: 700; color: #4f4f4f;
      text-align: center; padding: 6px 16px 14px;
    }

    .wave { display: block; width: 100%; flex-shrink: 0; }

    .dash-bottom {
      flex: 1; background: #EDE7D2;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      display: flex; flex-direction: column;
    }

    .tx-list { flex: 1; padding: 16px 46px 96px; }

    .tx-item { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; }
    .tx-date  { font-size: clamp(15px, 4.5vw, 20px); font-weight: 400; color: #6b6b6b; }
    .tx-amt   { font-size: clamp(15px, 4.5vw, 20px); font-weight: 700; color: #000; }
    .tx-amt.pending { opacity: 0.4; }
    .tx-empty { color: #9b9b9b; text-align: center; padding: 28px 0; font-size: 17px; }

    .tx-toggle {
      display: block; margin: 12px auto 4px;
      background: none; border: none;
      color: #6b6b6b; font-family: 'Lato', sans-serif;
      font-size: clamp(14px, 4vw, 17px); font-weight: 700;
      text-decoration: underline; cursor: pointer;
    }

    .tx-delete {
      display: block; margin: 4px auto 4px;
      background: none; border: none;
      color: #b35c4a; font-family: 'Lato', sans-serif;
      font-size: clamp(14px, 4vw, 17px); font-weight: 700;
      text-decoration: underline; cursor: pointer;
    }

    .einzahlen-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #5e5e5e; border: 1px solid #4f4f4f; border-radius: 56px;
      color: #f2f2f2; font-family: 'Lato', sans-serif;
      font-size: clamp(16px, 4.5vw, 20px); font-weight: 700;
      padding: 14px 24px; width: min(284px, 80%);
      cursor: pointer; box-shadow: 0 4px 2px rgba(0,0,0,0.25);
      position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%);
    }
    .einzahlen-btn:active { transform: translateX(-50%) scale(0.97); }

    /* ── PAYMENT ─────────────────────────────── */
    #s-pay { background: #51e0bf; align-items: center; }

    .pay-header {
      display: flex; align-items: center;
      width: 100%; padding: 20px 20px 8px; flex-shrink: 0;
    }

    .back-btn {
      background: none; border: none; font-size: 32px; color: #333;
      cursor: pointer; line-height: 1; padding: 2px 10px 2px 0;
    }

    .pay-name {
      flex: 1; text-align: center;
      font-size: clamp(24px, 8.5vw, 32px); font-weight: 700; color: #4f4f4f;
      margin-right: 34px;
    }

    .pig-img { width: min(40vw, 152px); flex-shrink: 0; }

    .coins-wrap {
      position: relative;
      height: min(40vw, 160px);
      flex-shrink: 0; margin: 6px 0;
      display: flex; align-items: flex-end; justify-content: center;
    }

    .coin {
      position: absolute; bottom: 0;
      width: min(40vw, 160px); height: min(40vw, 160px);
      transition: left 0.15s ease;
    }

    .amount-pill {
      background: rgba(242,242,242,0.4); border-radius: 16px;
      padding: 8px 28px;
      font-size: clamp(26px, 9vw, 44px); font-weight: 700;
      color: #444; flex-shrink: 0; margin: 4px 0;
    }

    .pay-controls {
      display: flex; align-items: center; justify-content: center;
      gap: clamp(24px, 8vw, 48px); margin-top: 16px; flex-shrink: 0;
    }

    .ctrl-img {
      width: min(16vw, 64px); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-img:active { transform: scale(0.9); }

    /* Swipe-to-pay pill */
    .swipe-pill {
      width: min(18vw, 70px);
      height: min(48vw, 190px);
      background: #2a2a2a;
      border-radius: 999px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 14px;
      flex-shrink: 0;
      touch-action: none;
      user-select: none;
      cursor: grab;
      -webkit-tap-highlight-color: transparent;
    }

    .swipe-chevrons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      pointer-events: none;
    }

    .chev {
      width: min(5vw, 20px);
      height: min(3vw, 12px);
      animation: chev-pulse 1.4s ease-in-out infinite;
    }
    .chev:nth-child(1) { animation-delay: 0.4s; }
    .chev:nth-child(2) { animation-delay: 0.2s; }
    .chev:nth-child(3) { animation-delay: 0s; }

    @keyframes chev-pulse {
      0%, 100% { opacity: 0.15; transform: translateY(3px); }
      50%       { opacity: 0.85; transform: translateY(-3px); }
    }

    .swipe-thumb {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: min(14vw, 54px);
      height: min(14vw, 54px);
      background: #f0f0f0;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-check {
      width: 60%; height: 60%;
      opacity: 0;
    }
    .thumb-check path {
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
    }
    .thumb-check.draw {
      opacity: 1;
      animation: thumb-check-fade 0.05s ease forwards;
    }
    .thumb-check.draw path {
      animation: thumb-check-draw 0.4s ease forwards;
    }
    @keyframes thumb-check-fade { to { opacity: 1; } }
    @keyframes thumb-check-draw { to { stroke-dashoffset: 0; } }

    .coin.vanish {
      animation: coin-vanish 0.35s ease-in forwards;
    }
    @keyframes coin-vanish {
      0%   { transform: scale(1);    opacity: 1; filter: brightness(1)   drop-shadow(0 0 0 rgba(255,255,255,0)); }
      40%  { transform: scale(1.15); opacity: 1; filter: brightness(1.7) drop-shadow(0 0 14px rgba(255,255,255,0.9)); }
      100% { transform: scale(0.3);  opacity: 0; filter: brightness(2)   drop-shadow(0 0 20px rgba(255,255,255,0.9)); }
    }

    .sparkle-group {
      position: absolute;
      pointer-events: none;
      animation: sparkle-group-scale 0.8s ease-out forwards;
    }
    @keyframes sparkle-group-scale {
      0%    { transform: scale(1); }
      10%   { transform: scale(1); }
      37.5% { transform: scale(1.5); }
      100%  { transform: scale(1.5); }
    }

    .sparkle {
      position: absolute;
      width: 18px; height: 18px;
      pointer-events: none;
      opacity: 0;
      animation: sparkle-fade 0.8s ease-out forwards;
    }
    @keyframes sparkle-fade {
      0%    { opacity: 0; transform: scale(0.5) rotate(0deg); }
      10%   { opacity: 1; transform: scale(1)   rotate(8deg); }
      37.5% { opacity: 1; transform: scale(2)   rotate(8deg); }
      100%  { opacity: 0; transform: scale(2.2) rotate(20deg); }
    }

    .pig-img.pig-wiggle {
      animation: pig-wiggle 1s ease-in-out;
      transform-origin: 50% 100%;
    }
    @keyframes pig-wiggle {
      0%, 100% { transform: rotate(0deg); }
      10%      { transform: rotate(-13deg); }
      25%      { transform: rotate(13deg); }
      40%      { transform: rotate(-11deg); }
      55%      { transform: rotate(11deg); }
      70%      { transform: rotate(-7deg); }
      85%      { transform: rotate(7deg); }
    }

    /* ── SETTINGS ACTION SHEET ─────────────────── */
    .settings-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .settings-overlay.show { opacity: 1; pointer-events: auto; }

    .settings-sheet {
      background: #EDE7D2;
      width: 100%; max-width: 480px;
      border-radius: 24px 24px 0 0;
      padding: 12px 24px 28px;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.2);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .settings-overlay.show .settings-sheet { transform: translateY(0); }

    .settings-handle {
      width: 40px; height: 5px; border-radius: 3px;
      background: rgba(0,0,0,0.2);
      margin: 8px auto 20px;
    }

    .settings-label {
      display: block; font-family: 'Lato', sans-serif;
      font-weight: 700; color: #4f4f4f;
      font-size: 15px; margin: 18px 0 8px;
    }
    .settings-label:first-of-type { margin-top: 0; }

    .settings-input {
      width: 100%; box-sizing: border-box;
      font-family: 'Lato', sans-serif; font-size: 17px;
      padding: 12px 14px; border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.15);
      background: #fff; color: #333;
    }

    .settings-goal-wrap { position: relative; }
    .settings-goal-wrap .settings-input { padding-right: 36px; }
    .settings-suffix {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: #6b6b6b; font-weight: 700;
    }

    .settings-save {
      display: block; width: 100%; margin-top: 24px;
      background: #5e5e5e; color: #f2f2f2; border: none;
      border-radius: 56px; padding: 14px; font-size: 17px; font-weight: 700;
      font-family: 'Lato', sans-serif; cursor: pointer;
    }
    .settings-save:active { transform: scale(0.97); }

    .settings-cancel {
      display: block; width: 100%; margin-top: 10px;
      background: none; color: #6b6b6b; border: none;
      padding: 10px; font-size: 15px; font-family: 'Lato', sans-serif; cursor: pointer;
    }

    .settings-reset {
      display: block; width: 100%; margin-top: 4px;
      background: none; color: #b35c4a; border: none;
      padding: 10px; font-size: 15px; font-weight: 700;
      font-family: 'Lato', sans-serif; cursor: pointer; text-decoration: underline;
    }

    /* ── ONBOARDING ─────────────────────────────── */
    .onboard-screen {
      background: #EDE7D2;
      align-items: center; justify-content: center;
      padding: 24px 24px 120px;
    }
    .onboard-content { width: 100%; max-width: 380px; }

    .onboard-dots {
      display: flex; justify-content: center; gap: 8px; margin-top: 28px;
    }
    .onboard-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(0,0,0,0.15);
    }
    .onboard-dot.active { background: #51e0bf; }

    .onboard-step { text-align: center; }
    .onboard-emoji { font-size: 48px; margin-bottom: 8px; }
    .onboard-title {
      font-family: 'Lato', sans-serif; font-weight: 700; font-size: clamp(20px, 6vw, 26px);
      color: #4f4f4f; margin-bottom: 20px;
    }
    .onboard-hint {
      font-family: 'Lato', sans-serif; font-size: 14px; color: #9b9b9b;
      margin-top: 10px;
    }

    .onboard-goal-wrap { position: relative; }
    .onboard-goal-wrap .settings-input { padding-right: 36px; }
    .onboard-suffix {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: #6b6b6b; font-weight: 700;
    }

    .onboard-actions {
      position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%);
      width: min(284px, 80%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .onboard-next {
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #5e5e5e; border: 1px solid #4f4f4f; border-radius: 56px;
      color: #f2f2f2; font-family: 'Lato', sans-serif;
      font-size: clamp(16px, 4.5vw, 20px); font-weight: 700;
      padding: 14px 24px; cursor: pointer;
      box-shadow: 0 4px 2px rgba(0,0,0,0.25);
    }
    .onboard-next:active { transform: scale(0.97); }

    .onboard-back {
      background: none; border: none;
      color: #6b6b6b; font-family: 'Lato', sans-serif;
      font-size: clamp(14px, 4vw, 17px); font-weight: 700;
      text-decoration: underline; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ── DASHBOARD ──────────────────────────────────── -->
<div id="s-dash" class="screen hidden">
  <div class="dash-top">
    <button class="gear-btn" id="gear-btn" title="Einstellungen">
      <svg viewBox="0 0 24 24" fill="none" stroke="#4f4f4f" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                 a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                 A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                 l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                 A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                 l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                 a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                 l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                 a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <div class="ring-wrap">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- 270° background arc, gap at bottom -->
        <path d="M 43.43 156.57 A 80 80 0 1 1 156.57 156.57"
              fill="none" stroke="rgba(255,255,255,0.3)"
              stroke-width="14" stroke-linecap="round"/>
        <!-- Progress arc -->
        <path id="ring-arc"
              d="M 43.43 156.57 A 80 80 0 1 1 156.57 156.57"
              fill="none" stroke="#3a3a3a"
              stroke-width="14" stroke-linecap="round"
              stroke-dasharray="377 377" stroke-dashoffset="377"/>
      </svg>
      <div class="ring-text">
        <span class="ring-total" id="ring-total">€ 0</span>
        <span class="ring-sub"   id="ring-sub">von € 0</span>
      </div>
    </div>

    <p class="dash-jar-name" id="dash-name">…</p>
  </div>

  <!-- Wave between teal and cream -->
  <svg class="wave" viewBox="0 0 402 40" preserveAspectRatio="none"
       height="40" style="background:#51e0bf">
    <path d="M0,40 Q201,0 402,40 L402,40 L0,40 Z" fill="#EDE7D2"/>
  </svg>

  <div class="dash-bottom">
    <div class="tx-list" id="tx-list"></div>
  </div>

  <button class="einzahlen-btn" id="einzahlen-btn">🐷&nbsp; EINZAHLEN</button>
</div>

<!-- ── PAYMENT SCREEN ────────────────────────────── -->
<div id="s-pay" class="screen hidden">
  <div class="pay-header">
    <button class="back-btn" id="back-btn">‹</button>
    <span class="pay-name" id="pay-name">…</span>
  </div>

<script>
// ── FIREBASE CONFIG ───────────────────────────────────────────────────────────
// Ersetze diese Werte mit deinem Firebase-Projekt (Projekteinstellungen → Web-App)
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBBaKak7_7db65UfcBxN4_a1BvhrHe5fbU",
  authDomain:        "cashless-schweindl.firebaseapp.com",
  databaseURL:       "https://cashless-schweindl-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "cashless-schweindl",
  storageBucket:     "cashless-schweindl.firebasestorage.app",
  messagingSenderId: "1039478310915",
  appId:             "1:1039478310915:web:32c829a3a8b9f5560ce636"
};

// ── DEMO DATA (aktiv solange Firebase nicht konfiguriert) ─────────────────────
const DEMO_JAR = {
  name: 'Running Sushi',
  goal: 150,
  total: 75,
  taps: {
    a: { amount: 2, timestamp: Date.now() - 3.6e6,    status: 'confirmed' },
    b: { amount: 1, timestamp: Date.now() - 7.2e6,    status: 'confirmed' },
    c: { amount: 4, timestamp: Date.now() - 97.2e6,   status: 'confirmed' },
    d: { amount: 1, timestamp: Date.now() - 345.6e6,  status: 'confirmed' },
    e: { amount: 1, timestamp: Date.now() - 604.8e6,  status: 'confirmed' },
    f: { amount: 1, timestamp: Date.now() - 950.4e6,  status: 'confirmed' },
    g: { amount: 1, timestamp: Date.now() - 1641.6e6, status: 'confirmed' },
  }
};

const DEMO_MODE = FIREBASE_CONFIG.apiKey.startsWith('REPLACE');
let db = null;
if (!DEMO_MODE) {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
}

// ── ROUTING ───────────────────────────────────────────────────────────────────
const m = window.location.pathname.match(/^\/(?:[^/]+\/)*jar\/([^/]+)(\/pay)?$/);
const jarId  = m ? m[1] : 'demo';
const screen = m && m[2] === '/pay' ? 'pay' : 'dash';

// ── UTILS ─────────────────────────────────────────────────────────────────────
const fmtEur = n => `€ ${n},00`;

function fmtDate(ts) {
  const d = new Date(ts), now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1)   return 'vor < 1 Minute';
  if (mins < 60)  return `vor ${mins} Minute${mins === 1 ? '' : 'n'}`;
  const hours = Math.floor(mins / 60);
  if (hours < 12) return `vor ${hours} Stunde${hours === 1 ? '' : 'n'}`;
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const day   = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff  = Math.round((today - day) / 86400000);
  if (diff === 0) return 'heute';
  return d.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

// ── PROGRESS RING ─────────────────────────────────────────────────────────────
// Arc: 270° (gap at bottom), radius 80 → length = 2π × 80 × 0.75 ≈ 377
const ARC_LEN = 377;

function setRing(total, goal) {
  const p = goal > 0 ? Math.min(total / goal, 1) : 0;
  document.getElementById('ring-arc').style.strokeDashoffset = ARC_LEN * (1 - p);
  document.getElementById('ring-total').textContent = fmtEur(total);
  document.getElementById('ring-sub').textContent   = `von ${fmtEur(goal)}`;
}

// ── TRANSACTION LIST ──────────────────────────────────────────────────────────
const TX_PAGE_SIZE = 5;
let txList = [];
let txExpanded = false;

function renderTx(taps) {
  txList = taps ? Object.values(taps).sort((a, b) => b.timestamp - a.timestamp) : [];
  txExpanded = false;
  renderTxList();
}

function renderTxList() {
  const el = document.getElementById('tx-list');
  if (!txList.length) {
    el.innerHTML = '<p class="tx-empty">Noch keine Einzahlungen</p>';
    return;
  }
  const visible = txExpanded ? txList : txList.slice(0, TX_PAGE_SIZE);
  const itemsHtml = visible
    .map(t => `
      <div class="tx-item">
        <span class="tx-date">${fmtDate(t.timestamp)}</span>
        <span class="tx-amt${t.status === 'pending' ? ' pending' : ''}">${fmtEur(t.amount)}</span>
      </div>`)
    .join('');
  const toggleHtml = txList.length > TX_PAGE_SIZE
    ? `<button class="tx-toggle" id="tx-toggle">${txExpanded ? 'Weniger anzeigen' : 'Ältere anzeigen'}</button>`
    : '';
  const deleteHtml = txExpanded
    ? `<button class="tx-delete" id="tx-delete">Einträge löschen</button>`
    : '';
  el.innerHTML = itemsHtml + toggleHtml + deleteHtml;
  if (txList.length > TX_PAGE_SIZE) {
    document.getElementById('tx-toggle').onclick = () => {
      txExpanded = !txExpanded;
      renderTxList();
    };
  }
  if (txExpanded) {
    document.getElementById('tx-delete').onclick = clearTaps;
  }
}

async function clearTaps() {
  const confirmed = confirm('Möchten Sie wirklich alle Einträge löschen? Das Geld bleibt dabei natürlich am Sparschwein.');
  if (!confirmed) return;

  if (!DEMO_MODE) {
    await db.ref(`jars/${jarId}/taps`).remove();
  } else {
    txList = [];
    txExpanded = false;
    renderTxList();
  }
}

// ── COIN DISPLAY ──────────────────────────────────────────────────────────────
const COIN_SRC = '/assets/coin.png';

function renderCoins(amount) {
  const wrap  = document.getElementById('coins-wrap');
  const count = Math.min(amount, 5);
  const size  = Math.min(window.innerWidth * 0.4, 160);
  const step  = Math.min(window.innerWidth * 0.075, 30);
  const total = size + (count - 1) * step;

  wrap.style.width = total + 'px';
  wrap.innerHTML   = '';

  for (let i = 0; i < count; i++) {
    const img = document.createElement('img');
    img.src = COIN_SRC;
    img.className = 'coin';
    img.style.left = (i * step) + 'px';
    img.style.zIndex = i + 1;
    wrap.appendChild(img);
  }
}

// ── PAYMENT AMOUNT ────────────────────────────────────────────────────────────
let tapAmount = 1;

function setTapAmount(n) {
  tapAmount = Math.max(1, Math.min(n, 20));
  document.getElementById('amount-pill').textContent = `+ ${tapAmount},00 €`;
  renderCoins(tapAmount);
}

// ── SWIPE GESTURE ─────────────────────────────────────────────────────────────
function initSwipe() {
  const pill  = document.getElementById('swipe-pill');
  const thumb = document.getElementById('swipe-thumb');

  // Derive travel distance from actual rendered sizes
  function maxTravel() {
    const thumbH = thumb.offsetHeight || 54;
    return pill.offsetHeight - thumbH - 16; // 8px padding top + bottom
  }

  let startY = 0, currentY = 0, dragging = false;

  function onStart(y) {
    startY   = y;
    currentY = y;
    dragging = true;
    thumb.style.transition = 'none';
    pill.style.cursor = 'grabbing';
  }

  function onMove(y) {
    if (!dragging) return;
    currentY = y;
    const travel = Math.max(0, Math.min(startY - y, maxTravel()));
    thumb.style.bottom = (8 + travel) + 'px';
  }

  async function onEnd() {
    if (!dragging) return;
    dragging = false;
    pill.style.cursor = 'grab';
    const travel = Math.max(0, Math.min(startY - currentY, maxTravel()));
    const THRESHOLD = maxTravel() * 0.75;

    if (travel >= THRESHOLD) {
      document.getElementById('thumb-check').classList.add('draw');
      thumb.style.transition = 'bottom 0.12s ease';
      thumb.style.bottom = (8 + maxTravel()) + 'px';
      await new Promise(r => setTimeout(r, 180));
      await doTap();
    } else {
      thumb.style.transition = 'bottom 0.35s cubic-bezier(0.34,1.56,0.64,1)';
      thumb.style.bottom = '8px';
    }
  }

  pill.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientY); }, { passive: false });
  pill.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientY); },  { passive: false });
  pill.addEventListener('touchend',   e => { e.preventDefault(); onEnd(); },                         { passive: false });
  pill.addEventListener('mousedown',  e => onStart(e.clientY));
  window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientY); });
  window.addEventListener('mouseup',   ()  => { if (dragging) onEnd(); });
}

async function doTap() {
  const tap = { amount: tapAmount, timestamp: Date.now(), status: 'confirmed' };

  if (!DEMO_MODE) {
    try {
      const ref = db.ref(`jars/${jarId}`);
      await db.ref(`jars/${jarId}/taps`).push(tap);
      const snap = await ref.child('total').once('value');
      await ref.child('total').set((snap.val() || 0) + tapAmount);
    } catch (e) {
      console.error('Firebase Fehler:', e);
    }
  }

  // Kurzes visuelles Feedback
  const s = document.getElementById('s-pay');
  s.style.transition = 'background 0.2s';
  s.style.background = '#2ec4a0';

  // Münzen 0.3s nach Tap-Beginn: erst zu einem Stapel zusammenfahren, dann verschwinden,
  // danach kurz Glitzer-Sternchen an der Stelle des Stapels
  setTimeout(() => {
    const wrap  = document.getElementById('coins-wrap');
    const coins = wrap.querySelectorAll('.coin');
    const coinSize = coins[0]?.offsetWidth || 0;
    const centerLeft = (wrap.offsetWidth - coinSize) / 2;
    coins.forEach(coin => {
      coin.style.transition = 'left 0.2s ease-in';
      coin.style.left = centerLeft + 'px';
    });
    setTimeout(() => {
      coins.forEach((coin, i) => {
        coin.style.animationDelay = `${i * 25}ms`;
        coin.classList.add('vanish');
      });
      // Sparkles einblenden, Schwein-Wackeln startet 0.3s danach
      setTimeout(() => {
        spawnSparkles(wrap, centerLeft, coinSize);
        setTimeout(() => {
          document.querySelector('.pig-img').classList.add('pig-wiggle');
        }, 300);
      }, 400);
    }, 200);
  }, 300);

  // Gesamtdauer der Sequenz abwarten (Schwein startet bei 1200ms, wackelt 1000ms = 2200ms)
  await new Promise(r => setTimeout(r, 2200));

  location.href = `/jar/${jarId}`;
}

function spawnSparkles(wrap, centerLeft, coinSize) {
  const group = document.createElement('div');
  group.className = 'sparkle-group';
  group.style.left = (centerLeft + coinSize / 2) + 'px';
  group.style.bottom = (coinSize / 2) + 'px';
  wrap.appendChild(group);

  const offsets = [
    { x: -10, y: -8  }, { x: 14, y: -4 },
    { x: -4,  y: 16  }, { x: 18, y: 12 },
  ];
  offsets.forEach((off, i) => {
    const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    s.setAttribute('viewBox', '0 0 24 24');
    s.setAttribute('class', 'sparkle');
    s.innerHTML = '<path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z" fill="white"/>';
    s.style.left = (off.x - 9) + 'px';
    s.style.bottom = (off.y - 9) + 'px';
    s.style.animationDelay = `${i * 30}ms`;
    group.appendChild(s);
  });
  setTimeout(() => group.remove(), 900);
}

// ── SETTINGS ACTION SHEET ──────────────────────────────────────────────────────
let currentJar = null;

function openSettings() {
  document.getElementById('settings-name').value = currentJar?.name || '';
  document.getElementById('settings-goal').value = currentJar?.goal || '';
  const overlay = document.getElementById('settings-overlay');
  overlay.classList.remove('hidden');
  requestAnimationFrame(() => overlay.classList.add('show'));
}

function closeSettings() {
  const overlay = document.getElementById('settings-overlay');
  overlay.classList.remove('show');
  setTimeout(() => overlay.classList.add('hidden'), 300);
}

async function saveSettings() {
  const name = document.getElementById('settings-name').value.trim();
  const goal = parseInt(document.getElementById('settings-goal').value, 10);
  if (!name || !goal || goal < 1) return;

  if (!DEMO_MODE) {
    await db.ref(`jars/${jarId}`).update({ name, goal });
  } else {
    DEMO_JAR.name = name;
    DEMO_JAR.goal = goal;
    currentJar = DEMO_JAR;
    document.getElementById('dash-name').textContent = name;
    setRing(DEMO_JAR.total, goal);
  }
  closeSettings();
}

async function resetJar() {
  const confirmed = confirm('Möchtest du das Schweinchen wirklich zurücksetzen? Alle Einzahlungen und Einstellungen werden gelöscht und das Onboarding startet neu.');
  if (!confirmed || DEMO_MODE) { closeSettings(); return; }

  const snap = await db.ref(`jars/${jarId}`).once('value');
  const data = snap.val();
  if (data) {
    await db.ref(`archive/${jarId}/${Date.now()}`).set(data);
  }
  await db.ref(`jars/${jarId}`).set({ onboarded: false });
  closeSettings();
}

// ── ONBOARDING ────────────────────────────────────────────────────────────────
const ONBOARD_STEPS = 3;
let onboardStep = 0;

function showOnboardStep(i) {
  onboardStep = i;
  for (let s = 0; s < ONBOARD_STEPS; s++) {
    document.getElementById(`onboard-step-${s}`).classList.toggle('hidden', s !== i);
    document.querySelector(`.onboard-dot[data-step="${s}"]`).classList.toggle('active', s === i);
  }
  document.getElementById('onboard-back').classList.toggle('hidden', i === 0);
  document.getElementById('onboard-next').textContent = i === ONBOARD_STEPS - 1 ? 'Fertig' : 'Weiter';
}

function initOnboarding() {
  document.getElementById('onboard-name').value = '';
  document.getElementById('onboard-goal').value = '';
  document.getElementById('onboard-collection').value = '';
  showOnboardStep(0);
  document.getElementById('onboard-back').onclick = () => {
    if (onboardStep > 0) showOnboardStep(onboardStep - 1);
  };
  document.getElementById('onboard-next').onclick = async () => {
    if (onboardStep === 0 && !document.getElementById('onboard-name').value.trim()) return;
    if (onboardStep === 1 && !parseInt(document.getElementById('onboard-goal').value, 10)) return;
    if (onboardStep < ONBOARD_STEPS - 1) {
      showOnboardStep(onboardStep + 1);
    } else {
      await finishOnboarding();
    }
  };
}

async function finishOnboarding() {
  const name = document.getElementById('onboard-name').value.trim();
  const goal = parseInt(document.getElementById('onboard-goal').value, 10);
  const collection = document.getElementById('onboard-collection').value.trim();
  if (!name || !goal) return;

  await db.ref(`jars/${jarId}`).set({ onboarded: true, name, goal, collection, total: 0 });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {

  async function loadJar() {
    if (DEMO_MODE) return DEMO_JAR;
    const snap = await db.ref(`jars/${jarId}`).once('value');
    return snap.val();
  }

  if (screen === 'dash') {
    document.getElementById('einzahlen-btn').onclick = () => { location.href = `/jar/${jarId}/pay`; };
    document.getElementById('gear-btn').onclick = openSettings;
    document.getElementById('settings-cancel').onclick = closeSettings;
    document.getElementById('settings-overlay').onclick = (e) => {
      if (e.target.id === 'settings-overlay') closeSettings();
    };
    document.getElementById('settings-save').onclick = saveSettings;
    document.getElementById('settings-reset').onclick = resetJar;

    if (DEMO_MODE) {
      currentJar = DEMO_JAR;
      document.getElementById('dash-name').textContent = DEMO_JAR.name;
      setRing(DEMO_JAR.total, DEMO_JAR.goal);
      renderTx(DEMO_JAR.taps);
      document.getElementById('s-dash').classList.remove('hidden');
    } else {
      db.ref(`jars/${jarId}`).on('value', snap => {
        const data = snap.val();
        if (!data || !data.onboarded) {
          document.getElementById('s-dash').classList.add('hidden');
          document.getElementById('s-onboard').classList.remove('hidden');
          initOnboarding();
          return;
        }
        document.getElementById('s-onboard').classList.add('hidden');
        currentJar = data;
        document.getElementById('dash-name').textContent = data.name;
        setRing(data.total || 0, data.goal || 150);
        renderTx(data.taps || {});
        document.getElementById('s-dash').classList.remove('hidden');
      });
    }

  } else {
    // Payment screen
    document.getElementById('back-btn').onclick  = () => { location.href = `/jar/${jarId}`; };
    document.getElementById('minus-btn').onclick = () => setTapAmount(tapAmount - 1);
    document.getElementById('plus-btn').onclick  = () => setTapAmount(tapAmount + 1);

    const jar = await loadJar();
    if (!DEMO_MODE && (!jar || !jar.onboarded)) {
      location.href = `/jar/${jarId}`;
      return;
    }
    if (jar) {
      document.getElementById('pay-name').textContent = jar.name || '…';
    }
    setTapAmount(1);
    initSwipe();
    document.getElementById('s-pay').classList.remove('hidden');
  }
}

init();
</script>
